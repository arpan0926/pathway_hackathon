services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: supply_chain_db
    environment:
      POSTGRES_DB: supply_chain_db
      POSTGRES_USER: supply_chain_user
      POSTGRES_PASSWORD: supply_chain_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - supply-chain-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supply_chain_user -d supply_chain_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Member 2: GPS Simulator
  gps-simulator:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gps_simulator
    environment:
      DATABASE_URL: postgresql://supply_chain_user:supply_chain_pass@postgres:5432/supply_chain_db
      PYTHONUNBUFFERED: 1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./shared:/app/shared
    command: python simulator.py
    networks:
      - supply-chain-network
    restart: unless-stopped

  # Member 1: Pathway Pipeline
  pathway-pipeline:
    build:
      context: ./pathway_pipeline
      dockerfile: Dockerfile
    container_name: pathway_pipeline
    environment:
      DATABASE_URL: postgresql://supply_chain_user:supply_chain_pass@postgres:5432/supply_chain_db
      PYTHONUNBUFFERED: 1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./pathway_pipeline:/app
      - ./shared:/app/shared
      - ./data:/app/data
      - ./outputs:/app/outputs
    command: python pipeline.py
    networks:
      - supply-chain-network
    restart: unless-stopped

  # Member 2: Backend API
  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend_api
    environment:
      DATABASE_URL: postgresql://supply_chain_user:supply_chain_pass@postgres:5432/supply_chain_db
      PYTHONUNBUFFERED: 1
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./shared:/app/shared
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - supply-chain-network
    restart: unless-stopped

  # Member 3: Dashboard
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: dashboard
    environment:
      BACKEND_URL: http://backend-api:8000
      PYTHONUNBUFFERED: 1
    depends_on:
      - backend-api
    ports:
      - "8501:8501"
    volumes:
      - ./dashboard:/app
      - ./shared:/app/shared
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0
    networks:
      - supply-chain-network
    restart: unless-stopped

  # Member 4: GenAI Chatbot (optional - can run separately)
  # chatbot:
  #   build:
  #     context: ./genai_rag
  #     dockerfile: Dockerfile
  #   container_name: chatbot
  #   environment:
  #     BACKEND_URL: http://backend-api:8000
  #     OPENAI_API_KEY: ${OPENAI_API_KEY}
  #     PYTHONUNBUFFERED: 1
  #   depends_on:
  #     - backend-api
  #   volumes:
  #     - ./genai_rag:/app
  #     - ./shared:/app/shared
  #   networks:
  #     - supply-chain-network

networks:
  supply-chain-network:
    driver: bridge

volumes:
  postgres_data:
