databases:
  # PostgreSQL Database (Render Managed)
  - name: supply-chain-db
    databaseName: supply_chain_db
    user: supply_chain_user
    plan: free

services:
  # Backend API (Main service with GPS simulator integrated)
  - type: web
    name: backend-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: supply-chain-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
    healthCheckPath: /health

  # RAG Chatbot
  - type: web
    name: chatbot
    env: docker
    dockerfilePath: ./genai_rag/Dockerfile
    dockerContext: ./genai_rag
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: supply-chain-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false

  # AI Alert Service
  - type: web
    name: ai-alert-service
    env: docker
    dockerfilePath: ./ai_alert_service/dockerfile
    dockerContext: ./ai_alert_service
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: supply-chain-db
          property: connectionString
